    --paper:#f3ead9;
    --paper-dark:#e8dcc2;
    --ink:#3b2f26;
    --red:#a3402f;
    --red-dark:#7e2f22;
    --gold:#c99a3e;
    --green:#5c7a52;
    --line:#d8c9a6;
    --shadow: 0 3px 0 rgba(59,47,38,0.18);
    --tone1:#a3402f;
    --tone2:#b8822a;
    --tone3:#4c7a4f;
    --tone4:#2f6a8a;
    --tone5:#8a7a68;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: "Noto Serif","Noto Serif SC","Georgia","Songti SC","STSong", serif;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(169,64,47,0.05) 0, transparent 40%),

    color: var(--ink);
    min-height:100vh;
  }
  header{
    background: var(--red);
    color: var(--paper);
    padding: 18px 20px 14px;
    text-align:center;
    box-shadow: var(--shadow);
    position:relative;
    border-bottom: 4px double var(--gold);
  }
  header h1{
    margin:0;
    font-size: 1.5rem;
    letter-spacing: 1px;
  }
  header .sub{
    font-size:0.8rem;
    opacity:0.85;
    margin-top:4px;
    letter-spacing:2px;
  }
  .stats-bar{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    margin-top:10px;
    font-size:0.85rem;
  }
  .stat-chip{
    background: rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.35);
    border-radius: 20px;
    padding: 4px 12px;
  }
  nav{
    display:flex;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
    padding:12px;
    background: var(--paper-dark);
    border-bottom: 2px solid var(--line);
    position: sticky;
    top:0;
    z-index:10;
  }
  nav button{
    font-family:inherit;
    font-size:0.85rem;
    padding:8px 16px;
    border-radius: 6px;
    border: 2px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    cursor:pointer;
    transition: all .15s;
  }
  nav button.active{
    background: var(--red);
    color: var(--paper);
    border-color: var(--red-dark);
  }
  nav button:hover{ transform: translateY(-1px); }
  main{
    max-width: 780px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .card{
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card h2{
    margin-top:0;
    font-size:1.1rem;
    color: var(--red-dark);
    border-bottom: 2px dashed var(--line);
    padding-bottom:8px;
  }
  .lesson-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
    gap:12px;
  }
  .lesson-tile{
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius:10px;
    padding:14px 10px;
    text-align:center;
    cursor:pointer;
    position:relative;
    transition: transform .15s;
  }
  .lesson-tile:hover{ transform: translateY(-2px); }
  .lesson-tile.locked{
    opacity:0.45;
    cursor:not-allowed;
  }
  .lesson-tile.done{
    border-color: var(--green);
    background: #eef2e9;
  }
  .lesson-tile .num{
    font-size:1.4rem;
    font-weight:bold;
    color: var(--red-dark);
  }
  .lesson-tile .label{
    font-size:0.75rem;
    margin-top:4px;
    color:#6b5c49;
  }
  .badge-check{
    position:absolute;top:6px;right:8px;color:var(--green);font-size:0.9rem;
  }
  button.primary{
    font-family:inherit;
    background: var(--red);
    color: var(--paper);
    border:none;
    border-radius:8px;
    padding:12px 22px;
    font-size:0.95rem;
    cursor:pointer;
    box-shadow: var(--shadow);
  }
  button.primary:hover{ background: var(--red-dark); }
  button.secondary{
    font-family:inherit;
    background: transparent;
    color: var(--red-dark);
    border:2px solid var(--red-dark);
    border-radius:8px;
    padding:10px 20px;
    font-size:0.9rem;
    cursor:pointer;

  button:disabled{ opacity:0.5; cursor:not-allowed; }

    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 6px;
    border-bottom:1px solid var(--line);

    font-size:1.6rem;
    min-width:64px;
    color: var(--ink);
  }
  .pinyin{
    color: var(--red-dark);
    font-style:italic;
    min-width:80px;
    font-size:0.9rem;
  }

    cursor:pointer;

    cursor:pointer;

<script type="module">
/* ================= NHẬN DIỆN GIỌNG NÓI BẰNG AI CHẠY NGAY TRONG TRÌNH DUYỆT =================
   Dùng cho thiết bị không hỗ trợ Web Speech API (Safari/iPhone/iPad).
   Chạy hoàn toàn miễn phí trên máy người dùng (WebAssembly), không cần máy chủ, không cần API key.
   Chỉ tải mô hình (~40MB) khi người dùng thực sự bấm nút luyện nói lần đầu (lazy-load). */
window.__whisperPipelinePromise = null;
window.getWhisperPipeline = function(){
  if(!window.__whisperPipelinePromise){
    window.__whisperPipelinePromise = (async () => {
      const { pipeline, env } = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/+esm');
      env.allowLocalModels = false;
      return await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', { quantized: true });
    })();
  }
  return window.__whisperPipelinePromise;
};
</script>

/* ================= FIX LỖI DẤU TIẾNG VIỆT (Unicode NFC) ================= */
(function(){
  function normalizeNode(n){
    if(!n.nodeValue) return;
    var fixed = n.nodeValue.normalize('NFC');
    // Chỉ gán lại khi thực sự khác — tránh vòng lặp vô hạn với MutationObserver
    // (gán nodeValue dù giá trị giống hệt vẫn kích hoạt sự kiện characterData mới).
    if(fixed !== n.nodeValue) n.nodeValue = fixed;
  }
  function normalizeTree(root){
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
    var n;
    while(n = walker.nextNode()){ normalizeNode(n); }
  }
  normalizeTree(document.body);
  var domObserver = new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      if(m.type === 'characterData' && m.target){
        normalizeNode(m.target);
      }
      if(m.addedNodes){
        m.addedNodes.forEach(function(node){
          if(node.nodeType === 3){
            normalizeNode(node);
          } else if(node.nodeType === 1){
            normalizeTree(node);
          }
        });
      }
    });
  });
  domObserver.observe(document.body, {childList:true, subtree:true, characterData:true});
})();

/* ================= TÔ MÀU THANH ĐIỆU PINYIN ================= */
// Trả về số thanh điệu (1-4) dựa trên dấu trên nguyên âm; không có dấu -> thanh nhẹ (5).
function pinyinToneNum(syllable){
  if(!syllable) return 5;
  for(const ch of syllable){
    if('āēīōūǖ'.includes(ch)) return 1;
    if('áéíóúǘ'.includes(ch)) return 2;
    if('ǎěǐǒǔǚ'.includes(ch)) return 3;
    if('àèìòùǜ'.includes(ch)) return 4;
  }
  return 5;
}
// Tô màu từng âm tiết (cách nhau bởi khoảng trắng) trong một chuỗi pinyin theo thanh điệu.
function colorizePinyin(str){
  if(!str) return '';
  return str.split(' ').map(tok=>{
    if(!tok) return '';
    return `<span class="tone${pinyinToneNum(tok)}">${tok}</span>`;
  }).join(' ');
}

/* ================= STATE / STORAGE ================= */
const STORE_KEY = "hoctiengtrung_v1";
function loadState(){
  const defaults = {
    xp:0,
    streak:0,
    lastActive:null,
    completedLessons:{},   // lessonNum -> true
    boxes:{},               // wordId -> {box:1-5, due: 'YYYY-MM-DD'}
    badges:{},               // badgeId -> true
    sentenceRuns:0,          // số lần hoàn thành phiên luyện câu
    reminderEnabled:false,   // có bật nhắc học hằng ngày không
    lastReminderDate:null    // ngày cuối cùng đã hiện thông báo nhắc học
  };
  const raw = localStorage.getItem(STORE_KEY);
  if(raw){ try{ return Object.assign({}, defaults, JSON.parse(raw)); }catch(e){} }
  return defaults;
}
let state = loadState();
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(dateStr, n){
  const d = new Date(dateStr); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function touchStreak(){
  const t = todayStr();
  if(state.lastActive === t) return;
  if(state.lastActive === addDays(t,-1)){ state.streak += 1; }
  else { state.streak = 1; }
  state.lastActive = t;
  saveState();
}

function addXp(n){
  state.xp += n;
  saveState();
  checkBadges();
  renderHeader();
}

const LEVELS = [0,50,120,220,350,520,750,1050,1450,2000];
function levelFromXp(xp){
  let lvl=1;
  for(let i=0;i<LEVELS.length;i++){ if(xp>=LEVELS[i]) lvl=i+1; }
  return lvl;
}

/* ================= TTS ================= */
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#3b2f26;color:#f3ead9;padding:10px 18px;border-radius:8px;font-size:0.85rem;z-index:999;max-width:90%;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,0.3);';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(()=>{ t.style.display='none'; }, 3500);
}

let _voicesReady = false;
let _warnedNoVoice = false;

function doSpeak(text){
  const voices = speechSynthesis.getVoices();
  const zh = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('zh'));
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.85;
  if(zh) u.voice = zh;
  u.onerror = ()=> showToast('Không phát được giọng đọc. Trình duyệt/máy của bạn có thể chưa hỗ trợ giọng tiếng Trung.');
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
  if(!zh && !_warnedNoVoice){
    _warnedNoVoice = true;
    showToast('Máy bạn chưa có giọng đọc tiếng Trung cài sẵn. Vào Settings > Time & Language > Speech (Windows) hoặc System Settings > Accessibility > Spoken Content (Mac) để cài thêm giọng Chinese.');
  }
}

function speak(text){
  if(!('speechSynthesis' in window)){
    showToast('Trình duyệt này không hỗ trợ đọc giọng nói (Web Speech API). Hãy thử Chrome hoặc Edge.');
    return;
  }
  const existing = speechSynthesis.getVoices();
  if(existing.length > 0){
    _voicesReady = true;
    doSpeak(text);
    return;
  }
  if(!_voicesReady){
    speechSynthesis.onvoiceschanged = ()=>{
      _voicesReady = true;
      doSpeak(text);
    };
    speechSynthesis.getVoices();
    setTimeout(()=>{ if(!_voicesReady){ _voicesReady = true; doSpeak(text); } }, 400);
  } else {
    doSpeak(text);
  }
}

/* ---------- QUIZ ---------- */
function renderQuiz(lessonNum){
  const words = VOCAB.filter(w=>w.lesson===lessonNum);
  const questions = shuffle(words.slice()).map(w=>{
    const distractors = shuffle(VOCAB.filter(v=>v.id!==w.id)).slice(0,3);
    const options = shuffle([w, ...distractors]);
    return {word:w, options};
  });
  let qi = 0, correctCount = 0;

  function showQuestion(){
    if(qi >= questions.length){
      renderWritingPractice(lessonNum, words, correctCount);
      return;
    }
    const q = questions[qi];
    app.innerHTML = `
      <div class="card">
        <h2>Câu ${qi+1}/${questions.length}</h2>
        <div class="center" style="margin:14px 0;">
          <div class="hanzi" style="font-size:2.4rem;">${q.word.hanzi}</div>
          <div class="pinyin">${colorizePinyin(q.word.pinyin)}</div>
          <button class="speak-btn" id="qSpeak">🔊</button>
        </div>
        <div id="opts"></div>
      </div>`;
    document.getElementById('qSpeak').onclick = ()=>speak(q.word.hanzi);
    const optsDiv = document.getElementById('opts');
    q.options.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'quiz-opt';
      b.textContent = opt.meaning;
      b.onclick = ()=>{
        if(optsDiv.dataset.answered) return;
        optsDiv.dataset.answered = "1";
        const correct = opt.id === q.word.id;
        b.classList.add(correct?'correct':'wrong');
        if(correct) correctCount++;
        else{
          [...optsDiv.children].find(c=>c.textContent===q.word.meaning).classList.add('correct');
        }
        setTimeout(()=>{ qi++; showQuestion(); }, 700);
      };
      optsDiv.appendChild(b);
    });
  }
  showQuestion();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* ---------- LUYỆN VIẾT (HanziWriter) ---------- */
function renderWritingPractice(lessonNum, words, quizCorrectCount){
  // Gom các chữ Hán riêng lẻ (không trùng) từ các từ trong bài học
  const chars = [];
  words.forEach(w=>{
    w.hanzi.split('').forEach(ch=>{
      if(!chars.includes(ch)) chars.push(ch);
    });
  });

  let ci = 0;
  let totalMistakes = 0;
  let writer = null;

  if(chars.length === 0){
    finishLesson(0);
    return;
  }

  if(typeof HanziWriter === 'undefined'){
    // Thư viện luyện viết tải trong nền (defer) — chờ tối đa vài giây, không chặn cả app
    app.innerHTML = `<div class="card center"><p class="muted">Đang tải công cụ luyện viết…</p></div>`;
    let waited = 0;
    const waitForLib = setInterval(()=>{
      waited += 300;
      if(typeof HanziWriter !== 'undefined'){
        clearInterval(waitForLib);
        showChar();
      } else if(waited >= 5000){
        clearInterval(waitForLib);
        finishLesson(0);
      }
    }, 300);
    return;
  }

  showChar();

  function showChar(){
    if(ci >= chars.length){
      finishLesson(totalMistakes);
      return;
    }
    const ch = chars[ci];
    app.innerHTML = `
      <div class="card">
        <h2>✍️ Luyện viết · ${ci+1}/${chars.length}</h2>
        <p class="muted center">Xem hoạt ảnh nét chữ, sau đó viết đè lên bằng ngón tay hoặc Apple Pencil.</p>
        <div class="center">
          <div id="hanziTarget" class="hanzi-target-box"></div>
        </div>
        <div class="write-actions">
          <button class="secondary" id="replayDemo">▶ Xem lại nét</button>
          <button class="secondary" id="skipChar">Bỏ qua chữ này →</button>
        </div>
        <p id="writeResult" class="center muted" style="margin-top:10px;"></p>
      </div>`;

    writer = HanziWriter.create('hanziTarget', ch, {
      width: 220,
      height: 220,
      padding: 8,
      showOutline: true,
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 200
    });

    function startQuizMode(){
      document.getElementById('writeResult').textContent = 'Viết theo trí nhớ — nét sai sẽ hiện màu đỏ rồi tự sửa.';
      writer.quiz({
        onMistake: function(){ totalMistakes++; },
        onComplete: function(summaryData){
          document.getElementById('writeResult').textContent =
            summaryData.totalMistakes === 0
              ? '✅ Viết đúng ngay lần đầu!'
              : `Hoàn thành · sai ${summaryData.totalMistakes} lần`;
          setTimeout(()=>{ ci++; showChar(); }, 900);
        }
      });
    }

    writer.animateCharacter({ onComplete: startQuizMode });

    document.getElementById('replayDemo').onclick = ()=>{
      writer.cancelQuiz();
      writer.animateCharacter({ onComplete: startQuizMode });
    };
    document.getElementById('skipChar').onclick = ()=>{
      writer.cancelQuiz();
      ci++; showChar();
    };
  }

  function finishLesson(writeMistakes){
    state.completedLessons[lessonNum] = true;
    words.forEach(w=>{
      if(!state.boxes[w.id]) state.boxes[w.id] = {box:1, due: todayStr()};
    });
    saveState();
    const writingXp = Math.max(0, chars.length*3 - writeMistakes);
    const xpEarned = 20 + quizCorrectCount*2 + writingXp;
    addXp(xpEarned);
    checkBadges();
    app.innerHTML = `
      <div class="card center">
        <h2>🎉 Hoàn thành Bài ${lessonNum}!</h2>
        <p>Trắc nghiệm đúng ${quizCorrectCount} câu ${chars.length>0? '· Luyện viết '+chars.length+' chữ':''}</p>
        <p>+${xpEarned} XP</p>
        <button class="primary" id="toLessons">Quay lại lộ trình</button>
      </div>`;
    document.getElementById('toLessons').onclick = ()=> switchView('lessons');
  }
}

  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(typeof data !== 'object' || data===null) throw new Error('invalid');
      state = Object.assign({}, state, data);
      saveState();
      showToast('✅ Đã khôi phục tiến trình thành công!');

/* ---------- SPEECH RECOGNITION (luyện nói, miễn phí) ---------- */
function normalizeZh(str){ return (str||'').replace(/[，。？！,.\?!\s]/g,''); }
function similarity(a,b){
  a = normalizeZh(a); b = normalizeZh(b);
  if(!a || !b) return 0;
  const bChars = b.split('');
  let match = 0;
  a.split('').forEach(ch=>{
    const idx = bChars.indexOf(ch);
    if(idx>-1){ match++; bChars.splice(idx,1); }
  });
  return match / Math.max(a.length, b.length);
}
// So sánh từng chữ của câu mẫu với những gì nhận diện được, để chấm khoan dung hơn
// và cho biết chính xác chữ nào ổn / chữ nào cần luyện thêm (thay vì chỉ 1 kết quả đúng/sai chung).
function compareSpeechChars(said, target){
  const saidChars = normalizeZh(said).split('');
  const targetChars = normalizeZh(target).split('');
  const pool = saidChars.slice();
  return targetChars.map(ch=>{
    const idx = pool.indexOf(ch);
    if(idx>-1){ pool.splice(idx,1); return {ch, matched:true}; }
    return {ch, matched:false};
  });
}
function isIOSDevice(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function startSpeaking(targetText, onResult){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast('Trình duyệt chưa hỗ trợ nhận diện giọng nói.'); return; }
  const btn = document.getElementById('micBtn');
  const rec = new SR();
  rec.lang = 'zh-CN';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  let settled = false;
  if(btn){ btn.textContent = '🎙️ Đang nghe...'; btn.classList.add('listening'); btn.disabled = true; }
  const resetBtn = ()=>{
    if(btn){ btn.textContent = '🎤 Nhấn để nói'; btn.classList.remove('listening'); btn.disabled = false; }
  };
  // Một số trình duyệt (đặc biệt Safari/iOS) "khai" có hỗ trợ nhưng không thực sự chạy —
  // nếu sau vài giây không có phản hồi gì thì tự báo lỗi thay vì treo im lặng.
  const timeoutId = setTimeout(()=>{
    if(!settled){
      settled = true;
      resetBtn();
      try{ rec.abort(); }catch(e){}
      showToast('Không nhận được phản hồi từ micro sau vài giây. Thiết bị này (thường gặp trên iPhone/iPad) có thể chưa hỗ trợ đầy đủ tính năng nhận diện giọng nói. Hãy thử trên máy tính (Chrome/Edge) hoặc điện thoại Android.');
    }
  }, 6000);
  rec.onresult = (e)=>{
    settled = true; clearTimeout(timeoutId);
    onResult(e.results[0][0].transcript.trim());
  };
  rec.onerror = (e)=>{
    settled = true; clearTimeout(timeoutId);
    let msg = 'Không nhận diện được giọng nói. Hãy thử lại.';
    if(e.error==='not-allowed' || e.error==='service-not-allowed') msg = 'Cần cho phép truy cập microphone để dùng tính năng luyện nói.';
    if(e.error==='no-speech') msg = 'Không nghe thấy gì, hãy nói to và rõ hơn.';
    showToast(msg);
  };
  rec.onend = ()=>{ clearTimeout(timeoutId); resetBtn(); };
  try{ rec.start(); }catch(err){
    clearTimeout(timeoutId);
    resetBtn();
    showToast('Không thể khởi động micro. Hãy thử lại.');
  }
}

function hasNativeSpeechApi(){
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}

/* ---------- Ghi âm dự phòng cho iPhone/iPad (Safari không hỗ trợ SpeechRecognition) ---------- */
function recordAudioBlob(maxMs){
  return new Promise((resolve, reject)=>{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      reject(new Error('no-getusermedia')); return;
    }
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
      let mr;
      try{ mr = new MediaRecorder(stream); }
      catch(e){ stream.getTracks().forEach(t=>t.stop()); reject(e); return; }
      const chunks = [];
      mr.ondataavailable = e=>{ if(e.data && e.data.size>0) chunks.push(e.data); };
      mr.onstop = ()=>{
        stream.getTracks().forEach(t=>t.stop());
        resolve(new Blob(chunks, {type: mr.mimeType || 'audio/webm'}));
      };
      mr.onerror = (e)=>{
        stream.getTracks().forEach(t=>t.stop());
        reject(e.error || new Error('recorder-error'));
      };
      mr.start();
      setTimeout(()=>{ if(mr.state !== 'inactive') mr.stop(); }, maxMs);
    }).catch(reject);
  });
}

async function blobToWhisperInput(blob){
  const arrayBuffer = await blob.arrayBuffer();
  const AC = window.AudioContext || window.webkitAudioContext;
  const ctx = new AC();
  const decoded = await ctx.decodeAudioData(arrayBuffer.slice(0));
  const targetRate = 16000;
  const offline = new OfflineAudioContext(1, Math.ceil(decoded.duration*targetRate), targetRate);
  const src = offline.createBufferSource();
  src.buffer = decoded;
  src.connect(offline.destination);
  src.start();
  const rendered = await offline.startRendering();
  try{ ctx.close(); }catch(e){}
  return rendered.getChannelData(0);
}

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_,reject)=> setTimeout(()=> reject(new Error('timeout')), ms))
  ]);
}

// Dùng khi thiết bị (thường là iPhone/iPad) không có Web Speech API sẵn của trình duyệt.
// Bước 1: ghi âm. Bước 2: thử chấm tự động bằng AI chạy ngay trong trình duyệt (miễn phí).
// Nếu bước 2 không tải được (mạng yếu / máy cũ), tự chuyển sang cho người dùng tự nghe lại và tự đánh giá.
async function startVoicePracticeFallback(targetText, opts){
  const btn = opts.btn, resultDiv = opts.resultDiv;
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    resultDiv.innerHTML = `<p class="muted">Trình duyệt này chưa hỗ trợ ghi âm. Hãy thử trên trình duyệt khác.</p>`;
    return;
  }
  btn.textContent = '🎙️ Đang nghe... (nói ngay trong 4 giây)';
  btn.classList.add('listening');
  btn.disabled = true;
  resultDiv.innerHTML = '';

  let audioBlob;
  try{
    audioBlob = await recordAudioBlob(4000);
  }catch(err){
    btn.textContent = '🎤 Nhấn để nói';
    btn.classList.remove('listening');
    btn.disabled = false;
    showToast('Cần cho phép truy cập microphone để dùng tính năng luyện nói.');
    return;
  }

  btn.textContent = '⏳ Đang xử lý...';
  resultDiv.innerHTML = `<p class="muted">Đang thử nhận diện bằng AI ngay trên máy (lần đầu có thể mất 10-20 giây để tải mô hình)...</p>`;

  let autoText = null;
  try{
    const transcriber = await withTimeout(window.getWhisperPipeline(), 30000);
    const audioData = await blobToWhisperInput(audioBlob);
    const out = await withTimeout(transcriber(audioData, {language:'chinese', task:'transcribe'}), 20000);
    autoText = ((out && out.text) || '').trim();
  }catch(err){
    autoText = null;
  }

  btn.textContent = '🎤 Nhấn để nói';
  btn.classList.remove('listening');
  btn.disabled = false;

  if(autoText){
    opts.onAutoResult(autoText);
  }else{
    opts.onFallback(audioBlob);
  }
}

      <button class="primary" id="startSentence">Bắt đầu luyện câu</button>
      <p class="muted" style="margin-top:14px;">🎤 Luyện nói hoàn toàn miễn phí — trên Chrome/Edge dùng nhận diện giọng nói có sẵn của trình duyệt; trên iPhone/iPad (Safari không hỗ trợ tính năng này) app sẽ tự chuyển sang chấm điểm bằng AI chạy ngay trên máy, nếu không tải được thì cho bạn tự ghi âm và tự so sánh với giọng mẫu. Cần cho phép truy cập microphone.</p>
    </div>`;
  document.getElementById('startSentence').onclick = startSentenceSession;
}

function startSentenceSession(){
  const queue = shuffle(SENTENCES.slice());
  let idx = 0;
  const score = {listening:0, order:0, blank:0};

  function nextSentence(){
    if(idx >= queue.length){
      state.sentenceRuns += 1;
      saveState();
      const xpEarned = 10*queue.length + (score.listening+score.order+score.blank)*2;
      addXp(xpEarned);
      checkBadges();
      app.innerHTML = `
        <div class="card center">
          <h2>🎉 Hoàn thành phiên luyện câu!</h2>
          <p>Nghe đúng: ${score.listening}/${queue.length} · Sắp xếp đúng: ${score.order}/${queue.length} · Điền từ đúng: ${score.blank}/${queue.length}</p>
          <p>+${xpEarned} XP</p>
          <button class="primary" id="toHome3">Về trang chủ</button>
        </div>`;
      document.getElementById('toHome3').onclick = ()=>switchView('home');
      return;
    }
    stepListening(queue[idx]);
  }

  function stepListening(s){
    const correctText = s.meaning;
    const distractors = shuffle(SENTENCES.filter(x=>x.id!==s.id)).slice(0,3).map(x=>x.meaning);
    const options = shuffle([correctText, ...distractors]);
    app.innerHTML = `
      <div class="card">
        <h2>Bước 1/3 · Nghe & chọn nghĩa đúng</h2>
        <div class="center" style="margin:14px 0;">
          <button class="mic-btn" id="playSentence">🔊 Nghe câu</button>
        </div>
        <div id="opts"></div>
      </div>`;
    const fullText = s.tokens.join('');
    document.getElementById('playSentence').onclick = ()=>speak(fullText);
    speak(fullText);
    const optsDiv = document.getElementById('opts');
    options.forEach(opt=>{
      const b = document.createElement('button');
      b.className='quiz-opt';
      b.textContent = opt;
      b.onclick = ()=>{
        if(optsDiv.dataset.answered) return;
        optsDiv.dataset.answered = "1";
        const correct = opt === correctText;
        b.classList.add(correct?'correct':'wrong');
        if(correct) score.listening++;
        else{ [...optsDiv.children].find(c=>c.textContent===correctText).classList.add('correct'); }
        setTimeout(()=> stepOrder(s), 700);
      };
      optsDiv.appendChild(b);
    });
  }

  function stepOrder(s){
    const shuffled = shuffle(s.tokens.slice());
    let built = [];
    app.innerHTML = `
      <div class="card">
        <h2>Bước 2/3 · Sắp xếp thành câu đúng</h2>
        <p class="muted">${s.meaning}</p>
        <div class="built-sentence" id="built"></div>
        <div class="token-pool" id="pool"></div>
        <div class="center" style="margin-top:10px;">
          <button class="secondary" id="resetOrder">↺ Làm lại</button>
        </div>
      </div>`;
    const poolDiv = document.getElementById('pool');
    const builtDiv = document.getElementById('built');

    function renderPool(){
      poolDiv.innerHTML='';
      shuffled.forEach((tok,i)=>{
        const b = document.createElement('button');
        b.className='token-chip';
        b.textContent = tok;
        b.disabled = built.includes(i);
        b.onclick = ()=>{
          built.push(i);
          renderBuilt();
          renderPool();
          if(built.length === shuffled.length) checkOrder();
        };
        poolDiv.appendChild(b);
      });
    }
    function renderBuilt(){
      builtDiv.innerHTML = built.map(i=>shuffled[i]).join('') || '&nbsp;';
    }
    function checkOrder(){
      const answer = built.map(i=>shuffled[i]).join('');
      const correctAnswer = s.tokens.join('');
      const correct = answer === correctAnswer;
      if(correct) score.order++;
      builtDiv.style.borderColor = correct? 'var(--green)':'var(--red)';
      if(!correct){
        builtDiv.innerHTML += ` <span class="muted">(đáp án: ${correctAnswer})</span>`;
      }
      setTimeout(()=> stepBlank(s), 1300);
    }
    document.getElementById('resetOrder').onclick = ()=>{ built=[]; renderBuilt(); renderPool(); };
    renderPool(); renderBuilt();
  }

  function stepBlank(s){
    const fullText = s.tokens.join('');
    const sentenceWithBlank = fullText.replace(s.blankWord, '＿＿');
    app.innerHTML = `
      <div class="card">
        <h2>Bước 3/3 · Điền từ vào chỗ trống</h2>
        <div class="center hanzi" style="font-size:1.6rem; margin:14px 0;">${sentenceWithBlank}</div>
        <p class="pinyin center">${colorizePinyin(s.pinyin)}</p>
        <div id="opts"></div>
      </div>`;
    const optsDiv = document.getElementById('opts');
    shuffle(s.blankOptions.slice()).forEach(opt=>{
      const b = document.createElement('button');
      b.className='quiz-opt';
      b.textContent = opt;
      b.onclick = ()=>{
        if(optsDiv.dataset.answered) return;
        optsDiv.dataset.answered = "1";
        const correct = opt === s.blankWord;
        b.classList.add(correct?'correct':'wrong');
        if(correct) score.blank++;
        else{ [...optsDiv.children].find(c=>c.textContent===s.blankWord).classList.add('correct'); }
        setTimeout(()=> stepSpeak(s), 800);
      };
      optsDiv.appendChild(b);
    });
  }

  function stepSpeak(s){
    const fullText = s.tokens.join('');
    app.innerHTML = `
      <div class="card">
        <h2>Bonus · Luyện nói</h2>
        <div class="grammar-note">📘 ${s.grammar}</div>
        <div class="center hanzi" style="font-size:1.8rem; margin:10px 0;">${fullText}</div>
        <p class="pinyin center">${colorizePinyin(s.pinyin)}</p>
        <div class="center" style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
          <button class="secondary" id="listenSample">🔊 Nghe câu mẫu</button>
          <button class="mic-btn" id="micBtn">🎤 Nhấn để nói</button>
        </div>
        <div id="speechResult"></div>
        <div class="center" style="margin-top:16px;">
          <button class="secondary" id="skipSpeak">Câu tiếp theo →</button>
        </div>
      </div>`;
    document.getElementById('skipSpeak').onclick = ()=>{ idx++; nextSentence(); };
    document.getElementById('listenSample').onclick = ()=> speak(fullText);

    const micBtn = document.getElementById('micBtn');
    const resultDiv = document.getElementById('speechResult');

    function showAutoVerdict(said){
      // Chấm khoan dung + phản hồi theo từng chữ: giọng người Việt nói tiếng Trung
      // hiếm khi được máy nhận diện đúng 100%, nên thay vì 1 kết quả đúng/sai chung,
      // app chỉ ra rõ chữ nào ổn (xanh) và chữ nào cần luyện thêm (vàng) để không nản.
      const chars = compareSpeechChars(said, fullText);
      const ratio = chars.length ? chars.filter(c=>c.matched).length / chars.length : 0;
      const verdict = ratio>=0.5 ? '✅ Rất tốt!' : ratio>=0.25 ? '🟡 Khá ổn, gần đúng rồi — thử lại để chuẩn hơn nhé' : '💪 Cứ luyện tiếp, đừng nản — nghe lại câu mẫu rồi thử lại nhé';
      const charsHtml = chars.map(c=>`<span class="speech-char ${c.matched?'ok':'miss'}">${c.ch}</span>`).join('');
      resultDiv.innerHTML = `
        <div class="speech-result">
          Bạn nói: <b>${said}</b>
          <div class="speech-chars">${charsHtml}</div>
          ${verdict}
          <div class="center" style="margin-top:8px;">
            <button class="secondary" id="listenSampleAgain">🔊 Nghe lại câu mẫu</button>
          </div>
        </div>`;
      document.getElementById('listenSampleAgain').onclick = ()=> speak(fullText);
    }

    function showFallbackReview(audioBlob){
      const url = URL.createObjectURL(audioBlob);
      resultDiv.innerHTML = `
        <div class="speech-result">
          <p class="muted">Thiết bị này chưa tự chấm được — hãy nghe lại giọng bạn vừa ghi và so với giọng mẫu để tự đánh giá.</p>
          <audio controls src="${url}" style="width:100%; margin:8px 0;"></audio>
          <div class="center" style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
            <button class="secondary" id="playSample">🔊 Nghe giọng mẫu</button>
            <button class="secondary" id="selfGood">✅ Phát âm đúng</button>
            <button class="secondary" id="selfRetry">🔄 Ghi âm lại</button>
          </div>
          <p id="selfNote" class="center" style="margin-top:8px;"></p>
        </div>`;
      document.getElementById('playSample').onclick = ()=> speak(fullText);
      document.getElementById('selfGood').onclick = ()=>{
        document.getElementById('selfNote').textContent = '✅ Tốt lắm!';
      };
      document.getElementById('selfRetry').onclick = ()=> micBtn.click();
    }

    micBtn.onclick = ()=>{
      if(hasNativeSpeechApi() && !isIOSDevice()){
        startSpeaking(fullText, showAutoVerdict);
      }else{
        startVoicePracticeFallback(fullText, {
          btn: micBtn,
          resultDiv: resultDiv,
          onAutoResult: showAutoVerdict,
          onFallback: showFallbackReview
        });
      }
    };
  }

  nextSentence();
}

function startToneQuiz(){
  const ROUNDS = 8;
  let round = 0, correctCount = 0;
  const rounds = [];
  for(let i=0;i<ROUNDS;i++){
    const set = TONE_SETS[Math.floor(Math.random()*TONE_SETS.length)];
    const target = set[Math.floor(Math.random()*set.length)];
    rounds.push({set, target});
  }

  function showRound(){
    if(round >= ROUNDS){
      const xpEarned = correctCount * 4;
      addXp(xpEarned);
      checkBadges();
      app.innerHTML = `
        <div class="card center">
          <h2>🎉 Hoàn thành luyện thanh điệu!</h2>
          <p>Đúng ${correctCount}/${ROUNDS} câu · +${xpEarned} XP</p>
          <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px;">
            <button class="primary" id="toneAgain">Luyện lại</button>
            <button class="secondary" id="toneHome">Về trang chủ</button>
          </div>
        </div>`;
      document.getElementById('toneAgain').onclick = startToneQuiz;
      document.getElementById('toneHome').onclick = ()=>switchView('home');
      return;
    }
    const {set, target} = rounds[round];
    const shuffledOpts = shuffle(set.slice());
    app.innerHTML = `
      <div class="card">
        <h2>Câu ${round+1}/${ROUNDS} · Nghe và chọn đúng chữ</h2>
        <div class="center" style="margin:14px 0;">
          <button class="mic-btn" id="playTone">🔊 Nghe lại</button>
        </div>
        <div id="toneOpts" style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px;"></div>
      </div>`;
    speak(target.hanzi);
    document.getElementById('playTone').onclick = ()=> speak(target.hanzi);
    const optsDiv = document.getElementById('toneOpts');
    shuffledOpts.forEach(opt=>{
      const b = document.createElement('button');
      b.className='quiz-opt';
      b.innerHTML = `<div class="hanzi" style="font-size:1.6rem;">${opt.hanzi}</div><div class="pinyin">${colorizePinyin(opt.pinyin)}</div><div class="muted">${opt.meaning}</div>`;
      b.onclick = ()=>{
        if(optsDiv.dataset.answered) return;
        optsDiv.dataset.answered = "1";
        const correct = opt.hanzi === target.hanzi;
        b.classList.add(correct?'correct':'wrong');
        if(correct) correctCount++;
        else{ [...optsDiv.children].find(c=>c.querySelector('.hanzi').textContent===target.hanzi)?.classList.add('correct'); }
        setTimeout(()=>{ round++; showRound(); }, 900);
      };
      optsDiv.appendChild(b);
    });
  }
  showRound();
}

/* ---------- THI THỬ HSK1 (MÔ PHỎNG) ---------- */
const EXAM_QA = [
  {q:"你叫什么名字？", a:"我叫小明。"},
  {q:"你是哪国人？", a:"我是越南人。"},
  {q:"现在几点？", a:"现在三点。"},
  {q:"你喜欢喝什么？", a:"我喜欢喝茶。"},
  {q:"这个多少钱？", a:"这个十块钱。"}
];

function buildExamQuestions(){
  const qs = [];
  shuffle(VOCAB.slice()).slice(0,5).forEach(w=>{
    const distractors = shuffle(VOCAB.filter(v=>v.id!==w.id)).slice(0,3).map(v=>v.meaning);
    const options = shuffle([w.meaning, ...distractors]);
    qs.push({section:"Nghe · Từ vựng", type:"listen", audio:w.hanzi, prompt:"Nghe và chọn nghĩa đúng của từ", options, correct:w.meaning});
  });
  shuffle(SENTENCES.slice()).slice(0,5).forEach(s=>{
    const fullText = s.tokens.join('');
    const distractors = shuffle(SENTENCES.filter(x=>x.id!==s.id)).slice(0,3).map(x=>x.meaning);
    const options = shuffle([s.meaning, ...distractors]);
    qs.push({section:"Nghe · Câu", type:"listen", audio:fullText, prompt:"Nghe và chọn nghĩa đúng của câu", options, correct:s.meaning});
  });
  shuffle(EXAM_QA.slice()).forEach(pair=>{
    const distractors = shuffle(EXAM_QA.filter(x=>x.a!==pair.a)).slice(0,3).map(x=>x.a);
    const options = shuffle([pair.a, ...distractors]);
    qs.push({section:"Nghe · Hỏi đáp", type:"listen", audio:pair.q, prompt:"Nghe câu hỏi, chọn câu trả lời đúng", options, correct:pair.a, hanziOptions:true});
  });
  shuffle(VOCAB.slice()).slice(0,5).forEach(w=>{
    const distractors = shuffle(VOCAB.filter(v=>v.id!==w.id)).slice(0,3).map(v=>v.meaning);
    const options = shuffle([w.meaning, ...distractors]);
    qs.push({section:"Đọc · Từ vựng", type:"read-word", hanzi:w.hanzi, prompt:"Từ này nghĩa là gì?", options, correct:w.meaning});
  });
  shuffle(SENTENCES.slice()).slice(0,5).forEach(s=>{
    const fullText = s.tokens.join('');
    const isTrue = Math.random() < 0.5;
    let statement = s.meaning;
    if(!isTrue){
      const others = SENTENCES.filter(x=>x.id!==s.id);
      statement = others[Math.floor(Math.random()*others.length)].meaning;
    }
    qs.push({section:"Đọc · Đúng/Sai", type:"read-truefalse", hanzi:fullText, statement, correct:isTrue});
  });
  shuffle(SENTENCES.slice()).slice(0,5).forEach(s=>{
    const fullText = s.tokens.join('');
    const sentenceWithBlank = fullText.replace(s.blankWord, '＿＿');
    const options = shuffle(s.blankOptions.slice());
    qs.push({section:"Đọc · Điền từ", type:"read-word", hanzi:sentenceWithBlank, prompt:"Chọn từ đúng để điền vào chỗ trống", options, correct:s.blankWord, hanziOptions:true});
  });
  return qs;
}

function renderExamHome(){
  app.innerHTML = `
    <div class="card">
      <h2>Thi thử HSK1 (mô phỏng)</h2>
      <p>Bài thi thử rút gọn theo cấu trúc đề HSK1 thật: <b>15 câu Nghe</b> (từ vựng, câu, hỏi-đáp) + <b>15 câu Đọc</b> (từ vựng, đúng/sai, điền từ), có tính giờ 20 phút.</p>
      <p class="muted">Lưu ý: đây là bản mô phỏng miễn phí để luyện tập, không có phần hình ảnh như đề thi chính thức và không thay thế cho việc đăng ký thi HSK1 thật.</p>
      <button class="primary" id="startExamBtn">Bắt đầu thi thử</button>
    </div>`;
  document.getElementById('startExamBtn').onclick = startExam;
}

function startExam(){
  const questions = buildExamQuestions();
  let qi = 0, correctCount = 0;
  const answers = [];
  let timeLeft = 20*60;
  let timerId = null;

  function formatTime(sec){
    const m = Math.floor(sec/60), s = sec%60;
    return `${m}:${s<10?'0':''}${s}`;
  }
  function startTimer(){
    timerId = setInterval(()=>{
      timeLeft--;
      const t = document.getElementById('examTimer');
      if(t) t.textContent = formatTime(timeLeft);
      if(timeLeft<=0){ clearInterval(timerId); finishExam(); }
    }, 1000);
  }

  function showQuestion(){
    if(qi >= questions.length){ clearInterval(timerId); finishExam(); return; }
    const q = questions[qi];
    let bodyHtml = '';
    if(q.type==='listen'){
      bodyHtml = `<p class="muted center">${q.prompt}</p><div class="center" style="margin:10px 0;"><button class="mic-btn" id="examPlay">🔊 Nghe</button></div>`;
    }else if(q.type==='read-word'){
      bodyHtml = `<div class="center hanzi" style="font-size:1.7rem; margin:10px 0;">${q.hanzi}</div><p class="muted center">${q.prompt}</p>`;
    }else if(q.type==='read-truefalse'){
      bodyHtml = `<div class="center hanzi" style="font-size:1.5rem; margin:10px 0;">${q.hanzi}</div><p class="center">Câu này có nghĩa là: <b>${q.statement}</b> — Đúng hay Sai?</p>`;
    }
    let optsHtml = q.type==='read-truefalse'
      ? `<div id="opts"><button class="quiz-opt" data-val="true">Đúng ✓</button><button class="quiz-opt" data-val="false">Sai ✗</button></div>`
      : `<div id="opts"></div>`;
    app.innerHTML = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
          <h2 style="margin:0; border:none; padding:0;">Câu ${qi+1}/${questions.length} · ${q.section}</h2>
          <div class="stat-chip" id="examTimer" style="background:var(--red); color:var(--paper);">${formatTime(timeLeft)}</div>
        </div>
        ${bodyHtml}
        ${optsHtml}
      </div>`;
    if(q.type==='listen'){
      speak(q.audio);
      document.getElementById('examPlay').onclick = ()=> speak(q.audio);
    }
    const optsDiv = document.getElementById('opts');
    if(q.type==='read-truefalse'){
      optsDiv.querySelectorAll('button').forEach(b=>{
        b.onclick = ()=>{
          if(optsDiv.dataset.answered) return;
          optsDiv.dataset.answered = "1";
          const val = b.dataset.val === 'true';
          const correct = val === q.correct;
          b.classList.add(correct?'correct':'wrong');
          if(correct) correctCount++;
          answers.push({section:q.section, correct});
          setTimeout(()=>{ qi++; showQuestion(); }, 600);
        };
      });
    }else{
      q.options.forEach(opt=>{
        const b = document.createElement('button');
        b.className = 'quiz-opt' + (q.hanziOptions ? ' hanzi' : '');
        b.textContent = opt;
        b.onclick = ()=>{
          if(optsDiv.dataset.answered) return;
          optsDiv.dataset.answered = "1";
          const correct = opt === q.correct;
          b.classList.add(correct?'correct':'wrong');
          if(correct) correctCount++;
          else{ [...optsDiv.children].find(c=>c.textContent===q.correct)?.classList.add('correct'); }
          answers.push({section:q.section, correct});
          setTimeout(()=>{ qi++; showQuestion(); }, 600);
        };
        optsDiv.appendChild(b);
      });
    }
  }

  function finishExam(){
    const total = questions.length;
    const scaledScore = Math.round(correctCount/total*200);
    const passed = scaledScore >= 120;
    const bySection = {};
    answers.forEach(a=>{
      if(!bySection[a.section]) bySection[a.section] = {correct:0, total:0};
      bySection[a.section].total++;
      if(a.correct) bySection[a.section].correct++;
    });
    const weakSections = Object.entries(bySection).filter(([k,v])=> v.correct/v.total < 0.6).map(([k])=>k);
    const xpEarned = correctCount*5;
    addXp(xpEarned);
    checkBadges();
    app.innerHTML = `
      <div class="card center">
        <h2>${passed?'🎉 Đạt':'📖 Chưa đạt'} · Kết quả thi thử</h2>
        <p>Đúng ${correctCount}/${total} câu</p>
        <p style="font-size:1.4rem; font-weight:bold; color:var(--red-dark);">${scaledScore}/200 điểm</p>
        <p class="muted">Ngưỡng tham khảo để "đạt" HSK1 thường là 120/200 — đây là bài thi thử tự tạo để luyện tập, không phải điểm số chính thức.</p>
        ${weakSections.length? `<p class="muted">Phần cần ôn thêm: <b>${weakSections.join(', ')}</b></p>` : ''}
        <p>+${xpEarned} XP</p>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px;">
          <button class="primary" id="examAgain">Thi lại</button>
          <button class="secondary" id="examHome">Về trang chủ</button>
        </div>
      </div>`;
    document.getElementById('examAgain').onclick = startExam;
    document.getElementById('examHome').onclick = ()=>switchView('home');
  }

  startTimer();
  showQuestion();
}

/* ---------- INIT ---------- */
if('speechSynthesis' in window){ speechSynthesis.getVoices(); }
if(state.reminderEnabled && 'Notification' in window && Notification.permission === 'granted'){
  startReminderChecker();
}
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
render('home');
</script>
</body>
</html>
