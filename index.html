<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学中文 · Học Tiếng Trung</title>
<style>
  :root{
    --paper:#f3ead9;
    --paper-dark:#e8dcc2;
    --ink:#3b2f26;
    --red:#a3402f;
    --red-dark:#7e2f22;
    --gold:#c99a3e;
    --green:#5c7a52;
    --line:#d8c9a6;
    --shadow: 0 3px 0 rgba(59,47,38,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: "Georgia","Songti SC","STSong", serif;
    background: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(169,64,47,0.05) 0, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(201,154,62,0.08) 0, transparent 45%);
    color: var(--ink);
    min-height:100vh;
  }
  header{
    background: var(--red);
    color: var(--paper);
    padding: 18px 20px 14px;
    text-align:center;
    box-shadow: var(--shadow);
    position:relative;
    border-bottom: 4px double var(--gold);
  }
  header h1{
    margin:0;
    font-size: 1.5rem;
    letter-spacing: 1px;
  }
  header .sub{
    font-size:0.8rem;
    opacity:0.85;
    margin-top:4px;
    letter-spacing:2px;
  }
  .stats-bar{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    margin-top:10px;
    font-size:0.85rem;
  }
  .stat-chip{
    background: rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.35);
    border-radius: 20px;
    padding: 4px 12px;
  }
  nav{
    display:flex;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
    padding:12px;
    background: var(--paper-dark);
    border-bottom: 2px solid var(--line);
    position: sticky;
    top:0;
    z-index:10;
  }
  nav button{
    font-family:inherit;
    font-size:0.85rem;
    padding:8px 16px;
    border-radius: 6px;
    border: 2px solid var(--line);
    background: var(--paper);
    color: var(--ink);
    cursor:pointer;
    transition: all .15s;
  }
  nav button.active{
    background: var(--red);
    color: var(--paper);
    border-color: var(--red-dark);
  }
  nav button:hover{ transform: translateY(-1px); }
  main{
    max-width: 780px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .card{
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card h2{
    margin-top:0;
    font-size:1.1rem;
    color: var(--red-dark);
    border-bottom: 2px dashed var(--line);
    padding-bottom:8px;
  }
  .lesson-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
    gap:12px;
  }
  .lesson-tile{
    background: var(--paper);
    border: 2px solid var(--line);
    border-radius:10px;
    padding:14px 10px;
    text-align:center;
    cursor:pointer;
    position:relative;
    transition: transform .15s;
  }
  .lesson-tile:hover{ transform: translateY(-2px); }
  .lesson-tile.locked{
    opacity:0.45;
    cursor:not-allowed;
  }
  .lesson-tile.done{
    border-color: var(--green);
    background: #eef2e9;
  }
  .lesson-tile .num{
    font-size:1.4rem;
    font-weight:bold;
    color: var(--red-dark);
  }
  .lesson-tile .label{
    font-size:0.75rem;
    margin-top:4px;
    color:#6b5c49;
  }
  .badge-check{
    position:absolute;top:6px;right:8px;color:var(--green);font-size:0.9rem;
  }
  button.primary{
    font-family:inherit;
    background: var(--red);
    color: var(--paper);
    border:none;
    border-radius:8px;
    padding:12px 22px;
    font-size:0.95rem;
    cursor:pointer;
    box-shadow: var(--shadow);
  }
  button.primary:hover{ background: var(--red-dark); }
  button.secondary{
    font-family:inherit;
    background: transparent;
    color: var(--red-dark);
    border:2px solid var(--red-dark);
    border-radius:8px;
    padding:10px 20px;
    font-size:0.9rem;
    cursor:pointer;
  }
  button:disabled{ opacity:0.5; cursor:not-allowed; }

    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 6px;
    border-bottom:1px solid var(--line);
  }
  .word-row:last-child{ border-bottom:none; }
  .hanzi{
    font-size:1.6rem;
    min-width:64px;
    color: var(--ink);
  }
  .pinyin{
    color: var(--red-dark);
    font-style:italic;
    min-width:80px;
    font-size:0.9rem;
  }
  .meaning{ flex:1; font-size:0.9rem; }
  .speak-btn{
    background:none;
    border: 1px solid var(--line);
    border-radius:50%;
    width:32px;height:32px;
    cursor:pointer;
    font-size:0.9rem;
  }
  .flash-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    padding: 20px 0;
  }
  .flashcard{
    width: 100%;
    max-width:340px;
    min-height:190px;
    background: var(--paper);
    border:3px solid var(--gold);
    border-radius:14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    cursor:pointer;
    box-shadow: 0 4px 0 rgba(59,47,38,0.18);
  }
  .flashcard .big{ font-size:2.6rem; }
  .flashcard .mid{ font-size:1.1rem; color:var(--red-dark); margin-top:8px; font-style:italic;}
  .flashcard .small{ font-size:1rem; margin-top:10px; color:#6b5c49; }
  .flash-actions{ display:flex; gap:12px; }
  .quiz-opt{
    display:block;
    width:100%;
    text-align:left;
    background: var(--paper);
    border:2px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    margin-bottom:10px;
    font-family:inherit;
    font-size:0.95rem;
    cursor:pointer;

  .quiz-opt.correct{ background:#e3ecd9; border-color:var(--green); }
  .quiz-opt.wrong{ background:#f1dcd6; border-color:var(--red); }

    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.85rem;
    margin: 10px 0 16px;
    color: #5c4a33;

    display:flex;
    flex-wrap:wrap;
    gap:8px;
    min-height:44px;
    padding:10px;
    border-radius:8px;
    border: 2px dashed var(--line);
    margin-bottom:12px;

  .token-chip{
    font-family:inherit;
    background: var(--paper);
    border:2px solid var(--red);
    color: var(--red-dark);
    border-radius:6px;
    padding:8px 12px;
    font-size:1rem;
    cursor:pointer;

  .mic-btn{
    font-family:inherit;
    background: var(--red);
    color: var(--paper);
    border:none;
    border-radius:50px;
    padding:14px 26px;
    font-size:1rem;
    cursor:pointer;
  }
  .mic-btn.listening{ background: var(--gold); }
  .speech-result{
    margin-top:12px;
    font-size:0.9rem;
    padding:10px;
    border-radius:8px;
    background: var(--paper-dark);

    background:#fff;
    border:2px solid var(--line);
    border-radius:12px;
    box-shadow: var(--shadow);

    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:14px;

    border-radius:6px;
    height:10px;
    overflow:hidden;
    border:1px solid var(--line);

  .progress-bar-inner{
    background: var(--red);
    height:100%;
  }
  .badge-list{ display:flex; flex-wrap:wrap; gap:10px; }
  .badge{
    background: var(--paper-dark);
    border:2px solid var(--gold);
    border-radius:50px;
    padding:8px 14px;
    font-size:0.8rem;
    display:flex; align-items:center; gap:6px;

  .badge.locked{ opacity:0.35; border-color: var(--line); }
  .center{text-align:center;}
  .muted{ color:#6b5c49; font-size:0.85rem; }
  footer{
    text-align:center;
    padding:20px;
    font-size:0.75rem;
    color:#8a7a63;
  }
  .stamp{
    display:inline-block;
    border:2px solid var(--red);
    color: var(--red);
    border-radius:8px;
    padding:2px 8px;
    font-size:0.7rem;
    transform:rotate(-4deg);
  }

/* ================= FIX LỖI DẤU TIẾNG VIỆT (Unicode NFC) ================= */
(function(){
  function normalizeNode(n){
    if(!n.nodeValue) return;
    var fixed = n.nodeValue.normalize('NFC');
    // Chỉ gán lại khi thực sự khác — tránh vòng lặp vô hạn với MutationObserver
    // (gán nodeValue dù giá trị giống hệt vẫn kích hoạt sự kiện characterData mới).
    if(fixed !== n.nodeValue) n.nodeValue = fixed;
  }
  function normalizeTree(root){
    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
    var n;
    while(n = walker.nextNode()){ normalizeNode(n); }
  }
  normalizeTree(document.body);
  var domObserver = new MutationObserver(function(mutations){
    mutations.forEach(function(m){
      if(m.type === 'characterData' && m.target){
        normalizeNode(m.target);
      }
      if(m.addedNodes){
        m.addedNodes.forEach(function(node){
          if(node.nodeType === 3){
            normalizeNode(node);
          } else if(node.nodeType === 1){
            normalizeTree(node);
          }
        });
      }
    });
  });
  domObserver.observe(document.body, {childList:true, subtree:true, characterData:true});
})();

/* ================= STATE / STORAGE ================= */
const STORE_KEY = "hoctiengtrung_v1";
function loadState(){
  const defaults = {
    xp:0,
    streak:0,
    lastActive:null,
    completedLessons:{},   // lessonNum -> true
    boxes:{},               // wordId -> {box:1-5, due: 'YYYY-MM-DD'}
    badges:{},               // badgeId -> true
    sentenceRuns:0           // số lần hoàn thành phiên luyện câu
  };
  const raw = localStorage.getItem(STORE_KEY);
  if(raw){ try{ return Object.assign({}, defaults, JSON.parse(raw)); }catch(e){} }
  return defaults;
}
let state = loadState();
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(dateStr, n){
  const d = new Date(dateStr); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function touchStreak(){
  const t = todayStr();
  if(state.lastActive === t) return;
  if(state.lastActive === addDays(t,-1)){ state.streak += 1; }
  else { state.streak = 1; }
  state.lastActive = t;
  saveState();
}

function addXp(n){
  state.xp += n;
  saveState();
  checkBadges();
  renderHeader();
}

const LEVELS = [0,50,120,220,350,520,750,1050,1450,2000];
function levelFromXp(xp){
  let lvl=1;
  for(let i=0;i<LEVELS.length;i++){ if(xp>=LEVELS[i]) lvl=i+1; }
  return lvl;
}

const BADGE_DEFS = [
  {id:"lesson1", label:"Bài học đầu tiên", test:()=> Object.keys(state.completedLessons).length>=1},
  {id:"lesson5", label:"Hoàn thành 5 bài", test:()=> Object.keys(state.completedLessons).length>=5},
  {id:"allLessons", label:"Xong toàn bộ HSK1", test:()=> Object.keys(state.completedLessons).length>=TOTAL_LESSONS},
  {id:"streak3", label:"Streak 3 ngày", test:()=> state.streak>=3},
  {id:"streak7", label:"Streak 7 ngày", test:()=> state.streak>=7},
  {id:"words50", label:"Học 50 từ", test:()=> Object.keys(state.boxes).length>=50},
  {id:"words150", label:"Học hết 150 từ", test:()=> Object.keys(state.boxes).length>=VOCAB.length},
  {id:"sentence1", label:"Luyện câu lần đầu", test:()=> state.sentenceRuns>=1},
  {id:"sentence5", label:"Luyện câu 5 lần", test:()=> state.sentenceRuns>=5},
];
function checkBadges(){
  BADGE_DEFS.forEach(b=>{ if(b.test()) state.badges[b.id] = true; });
  saveState();
}

function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#3b2f26;color:#f3ead9;padding:10px 18px;border-radius:8px;font-size:0.85rem;z-index:999;max-width:90%;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,0.3);';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(()=>{ t.style.display='none'; }, 3500);
}

let _voicesReady = false;
let _warnedNoVoice = false;

function doSpeak(text){
  const voices = speechSynthesis.getVoices();
  const zh = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('zh'));
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.85;
  if(zh) u.voice = zh;
  u.onerror = ()=> showToast('Không phát được giọng đọc. Trình duyệt/máy của bạn có thể chưa hỗ trợ giọng tiếng Trung.');
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
  if(!zh && !_warnedNoVoice){
    _warnedNoVoice = true;
    showToast('Máy bạn chưa có giọng đọc tiếng Trung cài sẵn. Vào Settings > Time & Language > Speech (Windows) hoặc System Settings > Accessibility > Spoken Content (Mac) để cài thêm giọng Chinese.');
  }
}

function speak(text){
  if(!('speechSynthesis' in window)){
    showToast('Trình duyệt này không hỗ trợ đọc giọng nói (Web Speech API). Hãy thử Chrome hoặc Edge.');
    return;
  }
  const existing = speechSynthesis.getVoices();
  if(existing.length > 0){
    _voicesReady = true;
    doSpeak(text);
    return;
  }
  if(!_voicesReady){
    speechSynthesis.onvoiceschanged = ()=>{
      _voicesReady = true;
      doSpeak(text);
    };
    speechSynthesis.getVoices();
    setTimeout(()=>{ if(!_voicesReady){ _voicesReady = true; doSpeak(text); } }, 400);
  } else {
    doSpeak(text);
  }
}

/* ---------- QUIZ ---------- */
function renderQuiz(lessonNum){
  const words = VOCAB.filter(w=>w.lesson===lessonNum);
  const questions = shuffle(words.slice()).map(w=>{
    const distractors = shuffle(VOCAB.filter(v=>v.id!==w.id)).slice(0,3);
    const options = shuffle([w, ...distractors]);
    return {word:w, options};
  });
  let qi = 0, correctCount = 0;

  function showQuestion(){
    if(qi >= questions.length){
      renderWritingPractice(lessonNum, words, correctCount);
      return;
    }
    const q = questions[qi];
    app.innerHTML = `
      <div class="card">
        <h2>Câu ${qi+1}/${questions.length}</h2>
        <div class="center" style="margin:14px 0;">
          <div class="hanzi" style="font-size:2.4rem;">${q.word.hanzi}</div>
          <div class="pinyin">${q.word.pinyin}</div>
          <button class="speak-btn" id="qSpeak">🔊</button>
        </div>
        <div id="opts"></div>
      </div>`;
    document.getElementById('qSpeak').onclick = ()=>speak(q.word.hanzi);
    const optsDiv = document.getElementById('opts');
    q.options.forEach(opt=>{
      const b = document.createElement('button');
      b.className = 'quiz-opt';
      b.textContent = opt.meaning;
      b.onclick = ()=>{
        if(optsDiv.dataset.answered) return;
        optsDiv.dataset.answered = "1";
        const correct = opt.id === q.word.id;
        b.classList.add(correct?'correct':'wrong');
        if(correct) correctCount++;
        else{
          [...optsDiv.children].find(c=>c.textContent===q.word.meaning).classList.add('correct');
        }
        setTimeout(()=>{ qi++; showQuestion(); }, 700);
      };
      optsDiv.appendChild(b);
    });
  }
  showQuestion();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

/* ---------- LUYỆN VIẾT (HanziWriter) ---------- */
function renderWritingPractice(lessonNum, words, quizCorrectCount){
  // Gom các chữ Hán riêng lẻ (không trùng) từ các từ trong bài học
  const chars = [];
  words.forEach(w=>{
    w.hanzi.split('').forEach(ch=>{
      if(!chars.includes(ch)) chars.push(ch);
    });
  });

  if(typeof HanziWriter === 'undefined' || chars.length === 0){
    finishLesson(0);
    return;
  }

  let ci = 0;
  let totalMistakes = 0;
  let writer = null;

  function showChar(){
    if(ci >= chars.length){
      finishLesson(totalMistakes);
      return;
    }
    const ch = chars[ci];
    app.innerHTML = `
      <div class="card">
        <h2>✍️ Luyện viết · ${ci+1}/${chars.length}</h2>
        <p class="muted center">Xem hoạt ảnh nét chữ, sau đó viết đè lên bằng ngón tay hoặc Apple Pencil.</p>
        <div class="center">
          <div id="hanziTarget" class="hanzi-target-box"></div>
        </div>
        <div class="write-actions">
          <button class="secondary" id="replayDemo">▶ Xem lại nét</button>
          <button class="secondary" id="skipChar">Bỏ qua chữ này →</button>
        </div>
        <p id="writeResult" class="center muted" style="margin-top:10px;"></p>
      </div>`;

    writer = HanziWriter.create('hanziTarget', ch, {
      width: 220,
      height: 220,
      padding: 8,
      showOutline: true,
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 200
    });

    function startQuizMode(){
      document.getElementById('writeResult').textContent = 'Viết theo trí nhớ — nét sai sẽ hiện màu đỏ rồi tự sửa.';
      writer.quiz({
        onMistake: function(){ totalMistakes++; },
        onComplete: function(summaryData){
          document.getElementById('writeResult').textContent =
            summaryData.totalMistakes === 0
              ? '✅ Viết đúng ngay lần đầu!'
              : `Hoàn thành · sai ${summaryData.totalMistakes} lần`;
          setTimeout(()=>{ ci++; showChar(); }, 900);
        }
      });
    }

    writer.animateCharacter({ onComplete: startQuizMode });

    document.getElementById('replayDemo').onclick = ()=>{
      writer.cancelQuiz();
      writer.animateCharacter({ onComplete: startQuizMode });
    };
    document.getElementById('skipChar').onclick = ()=>{
      writer.cancelQuiz();
      ci++; showChar();
    };
  }

  function finishLesson(writeMistakes){
    state.completedLessons[lessonNum] = true;
    words.forEach(w=>{
      if(!state.boxes[w.id]) state.boxes[w.id] = {box:1, due: todayStr()};
    });
    saveState();
    const writingXp = Math.max(0, chars.length*3 - writeMistakes);
    const xpEarned = 20 + quizCorrectCount*2 + writingXp;
    addXp(xpEarned);
    checkBadges();
    app.innerHTML = `
      <div class="card center">
        <h2>🎉 Hoàn thành Bài ${lessonNum}!</h2>
        <p>Trắc nghiệm đúng ${quizCorrectCount} câu ${chars.length>0? '· Luyện viết '+chars.length+' chữ':''}</p>
        <p>+${xpEarned} XP</p>
        <button class="primary" id="toLessons">Quay lại lộ trình</button>
      </div>`;
    document.getElementById('toLessons').onclick = ()=> switchView('lessons');
  }

  showChar();
}

/* ---------- SPEECH RECOGNITION (luyện nói, miễn phí) ---------- */
function normalizeZh(str){ return (str||'').replace(/[，。？！,.\?!\s]/g,''); }
function similarity(a,b){
  a = normalizeZh(a); b = normalizeZh(b);
  if(!a || !b) return 0;
  const bChars = b.split('');
  let match = 0;
  a.split('').forEach(ch=>{
    const idx = bChars.indexOf(ch);
    if(idx>-1){ match++; bChars.splice(idx,1); }
  });
  return match / Math.max(a.length, b.length);
}
function isIOSDevice(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function startSpeaking(targetText, onResult){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showToast('Trình duyệt chưa hỗ trợ nhận diện giọng nói.'); return; }
  const btn = document.getElementById('micBtn');
  const rec = new SR();
  rec.lang = 'zh-CN';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  let settled = false;
  if(btn){ btn.textContent = '🎙️ Đang nghe...'; btn.classList.add('listening'); btn.disabled = true; }
  const resetBtn = ()=>{
    if(btn){ btn.textContent = '🎤 Nhấn để nói'; btn.classList.remove('listening'); btn.disabled = false; }
  };
  // Một số trình duyệt (đặc biệt Safari/iOS) "khai" có hỗ trợ nhưng không thực sự chạy —
  // nếu sau vài giây không có phản hồi gì thì tự báo lỗi thay vì treo im lặng.
  const timeoutId = setTimeout(()=>{
    if(!settled){
      settled = true;
      resetBtn();
      try{ rec.abort(); }catch(e){}
      showToast('Không nhận được phản hồi từ micro sau vài giây. Thiết bị này (thường gặp trên iPhone/iPad) có thể chưa hỗ trợ đầy đủ tính năng nhận diện giọng nói. Hãy thử trên máy tính (Chrome/Edge) hoặc điện thoại Android.');
    }
  }, 6000);
  rec.onresult = (e)=>{
    settled = true; clearTimeout(timeoutId);
    onResult(e.results[0][0].transcript.trim());
  };
  rec.onerror = (e)=>{
    settled = true; clearTimeout(timeoutId);
    let msg = 'Không nhận diện được giọng nói. Hãy thử lại.';
    if(e.error==='not-allowed' || e.error==='service-not-allowed') msg = 'Cần cho phép truy cập microphone để dùng tính năng luyện nói.';
    if(e.error==='no-speech') msg = 'Không nghe thấy gì, hãy nói to và rõ hơn.';
    showToast(msg);
  };
  rec.onend = ()=>{ clearTimeout(timeoutId); resetBtn(); };
  try{ rec.start(); }catch(err){
    clearTimeout(timeoutId);
    resetBtn();
    showToast('Không thể khởi động micro. Hãy thử lại.');
  }
}

/* ---------- LUYỆN CÂU ---------- */
function renderSentenceHome(){
  app.innerHTML = `
    <div class="card">
      <h2>Luyện câu HSK1</h2>
      <p>Bộ ${SENTENCES.length} câu mẫu thông dụng — mỗi câu có 3 bước: nghe & chọn nghĩa, sắp xếp câu, điền từ. Sau đó là phần luyện nói (tuỳ chọn).</p>
      <p class="muted">Đã luyện: ${state.sentenceRuns} lần</p>
      <button class="primary" id="startSentence">Bắt đầu luyện câu</button>
      <p class="muted" style="margin-top:14px;">🎤 Luyện nói dùng tính năng nhận diện giọng nói có sẵn của trình duyệt (miễn phí hoàn toàn) — hoạt động tốt nhất trên Chrome hoặc Edge, cần cho phép truy cập microphone.</p>
    </div>`;
  document.getElementById('startSentence').onclick = startSentenceSession;
}

function startSentenceSession(){
  const queue = shuffle(SENTENCES.slice());
  let idx = 0;
  const score = {listening:0, order:0, blank:0};

  function nextSentence(){
    if(idx >= queue.length){
      state.sentenceRuns += 1;
      saveState();
      const xpEarned = 10*queue.length + (score.listening+score.order+score.blank)*2;
      addXp(xpEarned);
      checkBadges();
      app.innerHTML = `
        <div class="card center">
          <h2>🎉 Hoàn thành phiên luyện câu!</h2>
          <p>Nghe đúng: ${score.listening}/${queue.length} · Sắp xếp đúng: ${score.order}/${queue.length} · Điền từ đúng: ${score.blank}/${queue.length}</p>
          <p>+${xpEarned} XP</p>
          <button class="primary" id="toHome3">Về trang chủ</button>
        </div>`;
      document.getElementById('toHome3').onclick = ()=>switchView('home');
      return;
    }
    stepListening(queue[idx]);
  }

  function stepListening(s){
    const correctText = s.meaning;
    const distractors = shuffle(SENTENCES.filter(x=>x.id!==s.id)).slice(0,3).map(x=>x.meaning);
    const options = shuffle([correctText, ...distractors]);
    app.innerHTML = `
      <div class="card">
        <h2>Bước 1/3 · Nghe & chọn nghĩa đúng</h2>
        <div class="center" style="margin:14px 0;">
          <button class="mic-btn" id="playSentence">🔊 Nghe câu</button>
        </div>
        <div id="opts"></div>
      </div>`;
    const fullText = s.tokens.join('');
    document.getElementById('playSentence').onclick = ()=>speak(fullText);
    speak(fullText);
    const optsDiv = document.getElementById('opts');
    options.forEach(opt=>{
      const b = document.createElement('button');
      b.className='quiz-opt';
      b.textContent = opt;
      b.onclick = ()=>{
        if(optsDiv.dataset.answered) return;
        optsDiv.dataset.answered = "1";
        const correct = opt === correctText;
        b.classList.add(correct?'correct':'wrong');
        if(correct) score.listening++;
        else{ [...optsDiv.children].find(c=>c.textContent===correctText).classList.add('correct'); }
        setTimeout(()=> stepOrder(s), 700);
      };
      optsDiv.appendChild(b);
    });
  }

  function stepOrder(s){
    const shuffled = shuffle(s.tokens.slice());
    let built = [];
    app.innerHTML = `
      <div class="card">
        <h2>Bước 2/3 · Sắp xếp thành câu đúng</h2>
        <p class="muted">${s.meaning}</p>
        <div class="built-sentence" id="built"></div>
        <div class="token-pool" id="pool"></div>
        <div class="center" style="margin-top:10px;">
          <button class="secondary" id="resetOrder">↺ Làm lại</button>
        </div>
      </div>`;
    const poolDiv = document.getElementById('pool');
    const builtDiv = document.getElementById('built');

    function renderPool(){
      poolDiv.innerHTML='';
      shuffled.forEach((tok,i)=>{
        const b = document.createElement('button');
        b.className='token-chip';
        b.textContent = tok;
        b.disabled = built.includes(i);
        b.onclick = ()=>{
          built.push(i);
          renderBuilt();
          renderPool();
          if(built.length === shuffled.length) checkOrder();
        };
        poolDiv.appendChild(b);
      });
    }
    function renderBuilt(){
      builtDiv.innerHTML = built.map(i=>shuffled[i]).join('') || '&nbsp;';
    }
    function checkOrder(){
      const answer = built.map(i=>shuffled[i]).join('');
      const correctAnswer = s.tokens.join('');
      const correct = answer === correctAnswer;
      if(correct) score.order++;
      builtDiv.style.borderColor = correct? 'var(--green)':'var(--red)';
      if(!correct){
        builtDiv.innerHTML += ` <span class="muted">(đáp án: ${correctAnswer})</span>`;
      }
      setTimeout(()=> stepBlank(s), 1300);
    }
    document.getElementById('resetOrder').onclick = ()=>{ built=[]; renderBuilt(); renderPool(); };
    renderPool(); renderBuilt();
  }

  function stepBlank(s){
    const fullText = s.tokens.join('');
    const sentenceWithBlank = fullText.replace(s.blankWord, '＿＿');
    app.innerHTML = `
      <div class="card">
        <h2>Bước 3/3 · Điền từ vào chỗ trống</h2>
        <div class="center hanzi" style="font-size:1.6rem; margin:14px 0;">${sentenceWithBlank}</div>
        <p class="pinyin center">${s.pinyin}</p>
        <div id="opts"></div>
      </div>`;
    const optsDiv = document.getElementById('opts');
    shuffle(s.blankOptions.slice()).forEach(opt=>{
      const b = document.createElement('button');
      b.className='quiz-opt';
      b.textContent = opt;
      b.onclick = ()=>{
        if(optsDiv.dataset.answered) return;
        optsDiv.dataset.answered = "1";
        const correct = opt === s.blankWord;
        b.classList.add(correct?'correct':'wrong');
        if(correct) score.blank++;
        else{ [...optsDiv.children].find(c=>c.textContent===s.blankWord).classList.add('correct'); }
        setTimeout(()=> stepSpeak(s), 800);
      };
      optsDiv.appendChild(b);
    });
  }

  function stepSpeak(s){
    const fullText = s.tokens.join('');
    const hasApi = ('webkitSpeechRecognition' in window) || ('SpeechRecognition' in window);
    const canSpeak = hasApi && !isIOSDevice();
    app.innerHTML = `
      <div class="card">
        <h2>Bonus · Luyện nói</h2>
        <div class="grammar-note">📘 ${s.grammar}</div>
        <div class="center hanzi" style="font-size:1.8rem; margin:10px 0;">${fullText}</div>
        <p class="pinyin center">${s.pinyin}</p>
        ${canSpeak
          ? `<div class="center"><button class="mic-btn" id="micBtn">🎤 Nhấn để nói</button></div><div id="speechResult"></div>`
          : isIOSDevice()
            ? `<p class="muted center">Thiết bị iPhone/iPad chưa hỗ trợ nhận diện giọng nói qua trình duyệt (giới hạn của Safari/iOS, không phải lỗi ứng dụng). Hãy thử trên máy tính (Chrome/Edge) hoặc điện thoại Android để dùng tính năng luyện nói.</p>`
            : `<p class="muted center">Trình duyệt này chưa hỗ trợ nhận diện giọng nói. Hãy thử trên Chrome hoặc Edge (máy tính hoặc Android) để dùng tính năng luyện nói.</p>`}
        <div class="center" style="margin-top:16px;">
          <button class="secondary" id="skipSpeak">Câu tiếp theo →</button>
        </div>
      </div>`;
    document.getElementById('skipSpeak').onclick = ()=>{ idx++; nextSentence(); };
    if(canSpeak){
      document.getElementById('micBtn').onclick = ()=>{
        startSpeaking(fullText, (said)=>{
          const sim = similarity(said, fullText);
          const verdict = sim>=0.7 ? '✅ Rất tốt!' : sim>=0.4 ? '🟡 Gần đúng, thử lại nhé' : '🔴 Chưa đúng, nghe lại và thử lại';
          document.getElementById('speechResult').innerHTML = `<div class="speech-result">Bạn nói: <b>${said}</b><br>${verdict}</div>`;
        });
      };
    }
  }

  nextSentence();
}

if('speechSynthesis' in window){ speechSynthesis.getVoices(); }
render('home');
</script>
